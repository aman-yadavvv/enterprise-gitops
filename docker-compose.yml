services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: sneaker-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: sneaker-landing
    volumes:
      - mongodb_data:/data/db
    networks:
      - sneaker-network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: sneaker-redis-2
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sneaker-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sneaker-backend-2
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/sneaker-landing?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mongodb
      - redis
    networks:
      - sneaker-network
    volumes:
      - ./uploads:/app/uploads

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sneaker-frontend-2
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sneaker-network

networks:
  sneaker-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
